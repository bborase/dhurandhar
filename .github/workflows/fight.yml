name : Hello World
on :
    push :
        branches :
            - master
    workflow_dispatch :
        inputs :
            name :
                description : 'Your name'
                required : false
                #default : 'User'
jobs :
  hello :
    runs-on : ubuntu-latest
    steps :
        - name : say hello
          run : echo "Hello world from ${{ github.event.inputs.name }}"